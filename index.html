<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <meta name="mobile-web-app-capable" content="yes">

        <link rel="stylesheet" href="css/leaflet.css"><link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/MarkerCluster.css">
        <link rel="stylesheet" href="css/MarkerCluster.Default.css">
        <link rel="stylesheet" href="css/leaflet-control-geocoder.Geocoder.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script><script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-control-geocoder.Geocoder.js"></script>
        <script src="js/leaflet.markercluster.js"></script>
        <script src="data/PONTONOTAVEL_1.js"></script>
        <script src="data/LUMINARIAS_EXTERNAS_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString') {
              highlightLayer.setStyle({
                color: '#ffff00',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#ffff00',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[-5.851111567575905,-35.218756610403794],[-5.827712192712686,-35.187988178680705]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 1,
            maxNativeZoom: 30
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        function pop_PONTONOTAVEL_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">OBJECTID</th>\
                        <td>' + (feature.properties['OBJECTID'] !== null ? autolinker.link(feature.properties['OBJECTID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">COD_ID</th>\
                        <td>' + (feature.properties['COD_ID'] !== null ? autolinker.link(feature.properties['COD_ID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">DISTRIBUIDORA</th>\
                        <td>' + (feature.properties['DISTRIBUIDORA'] !== null ? autolinker.link(feature.properties['DISTRIBUIDORA'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">CONJUNTO</th>\
                        <td>' + (feature.properties['CONJUNTO'] !== null ? autolinker.link(feature.properties['CONJUNTO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">TIPO_PONTO_NOTAVEL</th>\
                        <td>' + (feature.properties['TIPO_PONTO_NOTAVEL'] !== null ? autolinker.link(feature.properties['TIPO_PONTO_NOTAVEL'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">ESTRUTURA</th>\
                        <td>' + (feature.properties['ESTRUTURA'] !== null ? autolinker.link(feature.properties['ESTRUTURA'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">MATERIAL</th>\
                        <td>' + (feature.properties['MATERIAL'] !== null ? autolinker.link(feature.properties['MATERIAL'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">ESFORCO</th>\
                        <td>' + (feature.properties['ESFORCO'] !== null ? autolinker.link(feature.properties['ESFORCO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">ALTURA</th>\
                        <td>' + (feature.properties['ALTURA'] !== null ? autolinker.link(feature.properties['ALTURA'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">TIPO_ESTRUTURA</th>\
                        <td>' + (feature.properties['TIPO_ESTRUTURA'] !== null ? autolinker.link(feature.properties['TIPO_ESTRUTURA'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">AREA_LOCALIZACAO</th>\
                        <td>' + (feature.properties['AREA_LOCALIZACAO'] !== null ? autolinker.link(feature.properties['AREA_LOCALIZACAO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">MUNICIPIO</th>\
                        <td>' + (feature.properties['MUNICIPIO'] !== null ? autolinker.link(feature.properties['MUNICIPIO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">DESCRICAO</th>\
                        <td>' + (feature.properties['DESCRICAO'] !== null ? autolinker.link(feature.properties['DESCRICAO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_PONTONOTAVEL_1_0() {
            return {
                pane: 'pane_PONTONOTAVEL_1',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,111,1,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_PONTONOTAVEL_1');
        map.getPane('pane_PONTONOTAVEL_1').style.zIndex = 401;
        map.getPane('pane_PONTONOTAVEL_1').style['mix-blend-mode'] = 'normal';
        var layer_PONTONOTAVEL_1 = new L.geoJson(json_PONTONOTAVEL_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_PONTONOTAVEL_1',
            layerName: 'layer_PONTONOTAVEL_1',
            pane: 'pane_PONTONOTAVEL_1',
            onEachFeature: pop_PONTONOTAVEL_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_PONTONOTAVEL_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_PONTONOTAVEL_1);
        map.addLayer(layer_PONTONOTAVEL_1);
        function pop_LUMINARIAS_EXTERNAS_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">POTENCIA</th>\
                        <td>' + (feature.properties['POTENCIA'] !== null ? autolinker.link(feature.properties['POTENCIA'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">LUMENS</th>\
                        <td>' + (feature.properties['LUMENS'] !== null ? autolinker.link(feature.properties['LUMENS'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">TIPO</th>\
                        <td>' + (feature.properties['TIPO'] !== null ? autolinker.link(feature.properties['TIPO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">FABRICACAO</th>\
                        <td>' + (feature.properties['FABRICACAO'] !== null ? autolinker.link(feature.properties['FABRICACAO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">INSTALACAO</th>\
                        <td>' + (feature.properties['INSTALACAO'] !== null ? autolinker.link(feature.properties['INSTALACAO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">MODELO</th>\
                        <td>' + (feature.properties['MODELO'] !== null ? autolinker.link(feature.properties['MODELO'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">S/N</th>\
                        <td>' + (feature.properties['S/N'] !== null ? autolinker.link(feature.properties['S/N'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Numero-NF</th>\
                        <td>' + (feature.properties['Numero-NF'] !== null ? autolinker.link(feature.properties['Numero-NF'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">FORNECEDOR</th>\
                        <td>' + (feature.properties['FORNECEDOR'] !== null ? autolinker.link(feature.properties['FORNECEDOR'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_LUMINARIAS_EXTERNAS_2_0() {
            return {
                pane: 'pane_LUMINARIAS_EXTERNAS_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(14,234,227,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LUMINARIAS_EXTERNAS_2');
        map.getPane('pane_LUMINARIAS_EXTERNAS_2').style.zIndex = 402;
        map.getPane('pane_LUMINARIAS_EXTERNAS_2').style['mix-blend-mode'] = 'normal';
        var layer_LUMINARIAS_EXTERNAS_2 = new L.geoJson(json_LUMINARIAS_EXTERNAS_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_LUMINARIAS_EXTERNAS_2',
            layerName: 'layer_LUMINARIAS_EXTERNAS_2',
            pane: 'pane_LUMINARIAS_EXTERNAS_2',
            onEachFeature: pop_LUMINARIAS_EXTERNAS_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_LUMINARIAS_EXTERNAS_2_0(feature));
            },
        });
        var cluster_LUMINARIAS_EXTERNAS_2 = new L.MarkerClusterGroup({showCoverageOnHover: false,
            spiderfyDistanceMultiplier: 2});
        cluster_LUMINARIAS_EXTERNAS_2.addLayer(layer_LUMINARIAS_EXTERNAS_2);

        bounds_group.addLayer(layer_LUMINARIAS_EXTERNAS_2);
        cluster_LUMINARIAS_EXTERNAS_2.addTo(map);
        var osmGeocoder = new L.Control.Geocoder({
            collapsed: true,
            position: 'topleft',
            text: 'Search',
            title: 'Testing'
        }).addTo(map);
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
        .className += ' fa fa-search';
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
        .title += 'Search for a place';
        var baseMaps = {};
        L.control.layers(baseMaps,{'<img src="legend/LUMINARIAS_EXTERNAS_2.png" /> LUMINARIAS_EXTERNAS': cluster_LUMINARIAS_EXTERNAS_2,'<img src="legend/PONTONOTAVEL_1.png" /> PONTO NOTAVEL': layer_PONTONOTAVEL_1,"GoogleSatellite": layer_GoogleSatellite_0,},{collapsed:false}).addTo(map);
        setBounds();
        resetLabels([layer_PONTONOTAVEL_1]);
        map.on("zoomend", function(){
            resetLabels([layer_PONTONOTAVEL_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_PONTONOTAVEL_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_PONTONOTAVEL_1]);
        });
        </script>
    </body>
</html>
